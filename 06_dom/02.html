<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"></meta>
<title>DOM learning</title>
</head>
<body>
<div class="bg-black">
<h1 id="title" class="heading">DOM learning with chai aur code</h1>
<p>This is my JS learning course.</p>
</div>
<ul>
    <li class="list-item">green</li>
    <li class="list-item">blue</li>
    <li class="list-item">red</li>
</ul>
<div class="parent">
<div class="day">MONDAY</div>
<div class="day">tuesday</div>
<div class="day">wednusday</div>
<div class="day">thursday</div>
<div class="day">friday</div>

</div>
</body>
<script>
    const parentClass = document.querySelector('.parent')
    console.log(parentClass)
    console.log(parentClass.children)

    for(i=0; i<parentClass.children.length; i++) {
        console.log(parentClass.children[i].innerHTML)
    }

    console.log(parentClass.firstElementChild)
    console.log(parentClass.lastElementChild)

    const dayOne = document.querySelector('.day')
    console.log(dayOne.parentElement)
    console.log(dayOne.nextElementSibling)

    console.log(parentClass.childNodes)
</script>
</html>
